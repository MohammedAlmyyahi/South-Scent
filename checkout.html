<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | تصفح المنتجات</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0f19; color: #fff; margin: 0; }
        header { background-color: #111827; padding: 20px; display: flex; justify-content: space-around; border-bottom: 1px solid #1f2937; }
        header a { color: #94a3b8; text-decoration: none; font-weight: bold; }
        header a:hover, header a.active { color: #00f2fe; }
        .container { max-width: 1000px; margin: 50px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .card { background-color: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 16px; text-align: center; }
        .price { color: #10b981; font-size: 1.5rem; font-weight: bold; display: block; margin: 15px 0; }
        .buy-link { background-color: #00f2fe; color: #0b0f19; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <a href="index.html">الرئيسية</a>
        <a href="store.html" class="active">المتجر</a>
        <a href="checkout.html">طلب الدفع</a>
        <a href="about.html">حولنا</a>
    </header>
    <h2 style="text-align: center; margin-top: 40px;">🛒 منتجاتنا الحصرية</h2>
    <div class="container">
        <div class="card">
            <h3>سماعة ألترا الرقمية</h3>
            <span class="price">$150</span>
            <a href="checkout.html" class="buy-link">شراء الآن</a>
        </div>
        <div class="card">
            <h3>ماوس القيصر اللاسلكي</h3>
            <span class="price">$75</span>
            <a href="checkout.html" class="buy-link">شراء الآن</a>
        </div>
    </div>
</body>
</html>

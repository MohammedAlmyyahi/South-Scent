<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الدفع | الشحن</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0f19; color: #fff; margin: 0; }
        header { background-color: #111827; padding: 20px; display: flex; justify-content: space-around; border-bottom: 1px solid #1f2937; }
        header a { color: #94a3b8; text-decoration: none; font-weight: bold; }
        header a:hover, header a.active { color: #00f2fe; }
        .form-box { max-width: 500px; margin: 60px auto; background-color: #111827; padding: 30px; border-radius: 20px; border: 1px solid #1f2937; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; background-color: #0b0f19; border: 1px solid #374151; border-radius: 8px; color: white; box-sizing: border-box; }
        button { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="index.html">الرئيسية</a>
        <a href="store.html">المتجر</a>
        <a href="checkout.html" class="active">طلب الدفع</a>
        <a href="about.html">حولنا</a>
    </header>
    <div class="form-box">
        <h2>📦 تأكيد طلب الشحن والدفع</h2>
        <form onsubmit="alert('🚀 تم استلام طلبك بنجاح وسنتصل بك للشحن والدفع عند الاستلام!'); return false;">
            <label>اسمك الكامل:</label>
            <input type="text" required placeholder="محمد حبيب">
            <label>رقم الهاتف:</label>
            <input type="tel" required placeholder="07700000000">
            <label>عنوان السكن:</label>
            <input type="text" required placeholder="العراق - بغداد">
            <button type="submit">تأكيد وشراء المنتج الحجم</button>
        </form>
    </div>
</body>
</html>

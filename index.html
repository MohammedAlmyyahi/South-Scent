<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية | متجر المستقبل</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0f19; color: #fff; margin: 0; text-align: center; }
        header { background-color: #111827; padding: 20px; display: flex; justify-content: space-around; border-bottom: 1px solid #1f2937; }
        header a { color: #94a3b8; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        header a:hover, header a.active { color: #00f2fe; }
        .hero { padding: 100px 20px; background: radial-gradient(circle, #1e1b4b 0%, #0b0f19 100%); }
        .cta-btn { background: linear-gradient(135deg, #00f2fe, #9333ea); color: white; border: none; padding: 15px 35px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        /* كود تصميم اللوجو والمنيو الجديد */
header { 
    background-color: #111827; 
    padding: 15px 5%; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 1px solid #1f2937; 
}
.logo { 
    font-size: 1.6rem; 
    font-weight: 800; 
    background: linear-gradient(135deg, #00f2fe, #9333ea); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
}
nav { 
    display: flex; 
    gap: 20px; 
}
nav a { 
    color: #94a3b8; 
    text-decoration: none; 
    font-weight: bold; 
    font-size: 1.05rem; 
    transition: 0.3s; 
}
nav a:hover, nav a.active { 
    color: #00f2fe; 
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.3); 
}
    </style>
</head>
<body>
   <header>
    <!-- كود اللوغو الجديد -->
    <div class="logo">🚀 NEXT-STORE</div>
    
    <!-- قائمة الروابط المحدثة -->
    <nav>
        <a href="index.html" class="active">الرئيسية</a>
        <a href="store.html">المتجر</a>
        <a href="checkout.html">طلب الدفع</a>
        <a href="about.html">حولنا</a>
    </nav>
</header>
    <div class="hero">
        <h1>🚀 مرحباً بك في واجهة متجرنا الاحترافي</h1>
        <p>هذا الموقع مقسم بالكامل إلى صفحات منفصلة ومربوطة بشكل برمي ذكي.</p>
        <a href="store.html" class="cta-btn">انتقل للمتجر وتصفح المنتجات</a>
    </div>
</body>
</html>
